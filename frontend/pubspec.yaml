name: family_tracker
description: A private family location tracking application.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.3
  go_router: ^14.2.0
  dio: ^5.5.0+1
  sqflite: ^2.3.3+1
  path: ^1.9.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  geolocator: ^12.0.0
  workmanager: ^0.9.0
  intl: ^0.19.0
  uuid: ^4.4.0
  web_socket_channel: ^2.4.5
  flutter_secure_storage: ^9.2.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
